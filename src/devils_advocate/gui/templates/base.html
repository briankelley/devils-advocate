<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Devil's Advocate{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <nav class="topnav">
        <a href="/" class="nav-brand">
            <img src="/static/brand/vectorized-dvad-color-white.svg" class="nav-logo" alt="dvad">
            <span class="nav-title">Devil's Advocate</span>
        </a>
        <div class="nav-links">
            <a href="/config" title="Settings"><i data-lucide="settings"></i></a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { if (typeof lucide !== 'undefined') lucide.createIcons(); });</script>
    {% block scripts %}{% endblock %}
</body>
</html>
