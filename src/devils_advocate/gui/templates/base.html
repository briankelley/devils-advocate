<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Devil's Advocate{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ version }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&display=swap" rel="stylesheet">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <nav class="topnav">
        <a href="/" class="nav-brand">
            <img src="/static/brand/vectorized-dvad-color-white.svg" class="nav-logo" alt="dvad" height="65" width="65">
            <span class="nav-title">Devil's Advocate</span>
        </a>
        <div class="nav-links">
            <a href="/config" title="Settings" class="nav-settings">
                <span class="nav-version">v{{ version }}</span>
                <i data-lucide="settings"></i>
            </a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Confirmation Dialog -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal-card confirm-card">
        <h3 id="confirm-title"></h3>
        <p id="confirm-message"></p>
        <div class="modal-actions">
          <button class="btn" onclick="dvad.closeConfirmDialog()">Cancel</button>
          <button id="confirm-action-btn" class="btn"></button>
        </div>
      </div>
    </div>
    <script src="/static/app.js?v={{ version }}"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { if (typeof lucide !== 'undefined') lucide.createIcons(); });</script>
    {% block scripts %}{% endblock %}
</body>
</html>
