{% extends "base.html" %}
{% block title %}New Review — dvad{% endblock %}
{% block content %}
<div class="page-header">
    <h1>New Review</h1>
</div>

<form id="review-form" class="review-form" enctype="multipart/form-data">
    <div class="form-row">
        <label>Mode</label>
        <div class="mode-selector">
            <label class="mode-opt"><input type="radio" name="mode" value="plan" checked> plan</label>
            <label class="mode-opt"><input type="radio" name="mode" value="code"> code</label>
            <label class="mode-opt"><input type="radio" name="mode" value="integration"> integration</label>
            <label class="mode-opt"><input type="radio" name="mode" value="spec"> spec</label>
        </div>
    </div>

    <div class="form-row">
        <label for="project">Project</label>
        <input type="text" id="project" name="project" required class="input" placeholder="project-name">
    </div>

    <div class="form-row" id="input-files-row">
        <label for="input_files">Input Files</label>
        <input type="file" id="input_files" name="input_files" multiple class="input-file">
        <div id="file-list" class="file-list"></div>
        <span class="field-hint" id="file-hint">Multiple files allowed for plan mode</span>
    </div>

    <div class="form-row" id="spec-row">
        <label for="spec_file">Spec File <span class="dim">(optional)</span></label>
        <input type="file" id="spec_file" name="spec_file" class="input-file">
    </div>

    <div class="form-row" id="project-dir-row" style="display:none">
        <label for="project_dir">Project Directory <span class="dim">(optional)</span></label>
        <input type="text" id="project_dir" name="project_dir" class="input" placeholder="/path/to/project">
    </div>

    <div class="form-row">
        <label for="max_cost">Max Cost <span class="dim">(optional)</span></label>
        <input type="number" id="max_cost" name="max_cost" step="0.01" min="0" class="input input-sm" placeholder="$0.00">
    </div>

    <div class="form-row">
        <label class="checkbox-label">
            <input type="checkbox" name="dry_run" id="dry_run"> Dry run
        </label>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-accent" id="submit-btn">Run Review</button>
    </div>

    <div id="form-error" class="error-msg" style="display:none"></div>
</form>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('review-form');
    const modeRadios = document.querySelectorAll('input[name="mode"]');
    const inputFilesInput = document.getElementById('input_files');
    const specRow = document.getElementById('spec-row');
    const projectDirRow = document.getElementById('project-dir-row');
    const fileHint = document.getElementById('file-hint');
    const inputRow = document.getElementById('input-files-row');

    function updateModeUI() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        if (mode === 'plan') {
            inputFilesInput.multiple = true;
            inputFilesInput.required = true;
            specRow.style.display = 'none';
            projectDirRow.style.display = 'none';
            fileHint.textContent = 'Multiple files allowed for plan mode';
            inputRow.style.display = '';
        } else if (mode === 'code') {
            inputFilesInput.multiple = false;
            inputFilesInput.required = true;
            specRow.style.display = '';
            projectDirRow.style.display = 'none';
            fileHint.textContent = 'Exactly one file required for code mode';
            inputRow.style.display = '';
        } else if (mode === 'spec') {
            inputFilesInput.multiple = true;
            inputFilesInput.required = true;
            specRow.style.display = 'none';
            projectDirRow.style.display = 'none';
            fileHint.textContent = 'Specification file(s) to enrich with suggestions';
            inputRow.style.display = '';
        } else {
            inputFilesInput.multiple = true;
            inputFilesInput.required = false;
            specRow.style.display = '';
            projectDirRow.style.display = '';
            fileHint.textContent = 'Input files are optional for integration mode';
            inputRow.style.display = '';
        }
    }

    modeRadios.forEach(r => r.addEventListener('change', updateModeUI));
    updateModeUI();

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('form-error');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Starting...';
        errorDiv.style.display = 'none';

        const formData = new FormData(form);
        const token = document.querySelector('meta[name="csrf-token"]').content;

        fetch('/api/review/start', {
            method: 'POST',
            headers: {'X-DVAD-Token': token},
            body: formData,
        })
        .then(r => r.json().then(data => ({ok: r.ok, data})))
        .then(({ok, data}) => {
            if (ok && data.review_id) {
                window.location.href = '/review/' + data.review_id;
            } else {
                errorDiv.textContent = data.detail || 'Failed to start review';
                errorDiv.style.display = '';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Run Review';
            }
        })
        .catch(err => {
            errorDiv.textContent = 'Network error: ' + err.message;
            errorDiv.style.display = '';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Run Review';
        });
    });
});
</script>
{% endblock %}
